<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    padding: 20px;
}

/* Title */
.title {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Filter buttons */
.filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.filters button {
    padding: 8px 16px;
    border: none;
    background: #e0e7ff;
    color: #333;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.filters button:hover {
    background: #6366f1;
    color: #fff;
}

/* Grid layout */
.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* Card design */
.card {
    background: #fff;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    transition: 0.3s ease;
    position: relative;
}

.card:hover {
    transform: translateY(-6px);
}

/* Category badge */
.card::before {
    content: attr(data-category);
    position: absolute;
    top: 10px;
    right: 10px;
    background: #6366f1;
    color: white;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 10px;
}

/* Text */
.card h3 {
    margin-bottom: 10px;
    color: #222;
}

.card p {
    font-size: 14px;
    color: #555;
    margin: 5px 0;
}

/* Price */
.price {
    font-size: 18px;
    font-weight: bold;
    color: #16a34a;
}

/* Button */
.card button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.card button:hover {
    opacity: 0.9;
}
    </style>
</head>
<body>
   <h1 class="title">🛍️ Product Store</h1>
<div id="checkout-btn"><button>checkout</button></div>
<div id="btns" class="filters"></div>

<div id="container" class="product-container"></div>


    <script src="./app.js"></script>
</body>
</html>
