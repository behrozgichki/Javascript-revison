<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StopWatch</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;

    /* premium animated background */
    background: radial-gradient(circle at top, #0f2027, #203a43, #0f2027);
  }

  /* floating glow effect */
  body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
    top: -100px;
    left: -100px;
    filter: blur(40px);
    animation: float 6s infinite alternate ease-in-out;
  }

  @keyframes float {
    from { transform: translate(0,0); }
    to { transform: translate(80px, 60px); }
  }

  .box {
    text-align: center;
    padding: 60px 50px;
    border-radius: 30px;

    /* ultra glass effect */
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(25px);

    box-shadow:
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 0 20px rgba(255,255,255,0.05);

    position: relative;
    z-index: 2;
  }

  /* title */
  h1.title {
    font-size: 2.6rem;
    margin-bottom: 25px;
    letter-spacing: 4px;
    color: #ffffff;
    text-transform: uppercase;

    text-shadow:
      0 0 10px rgba(0,255,255,0.4),
      0 0 25px rgba(0,255,255,0.2);
  }

  /* timer */
  #timer {
    font-size: 4rem;
    font-weight: 600;
    color: #00f7ff;
    margin-bottom: 35px;

    letter-spacing: 3px;
    text-shadow:
      0 0 15px rgba(0,247,255,0.8),
      0 0 40px rgba(0,247,255,0.3);
  }

  /* buttons container feel */
  button {
    padding: 14px 26px;
    margin: 8px;
    border: none;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    letter-spacing: 1px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  /* glow hover effect */
  button::after {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    top: 100%;
    left: -10%;
    background: rgba(255,255,255,0.15);
    transform: rotate(25deg);
    transition: 0.4s;
  }

  button:hover::after {
    top: -20%;
  }

  button:hover {
    transform: translateY(-3px) scale(1.08);
  }

  /* premium button colors */
  button:nth-child(3) {
    background: linear-gradient(135deg, #00c9ff, #92fe9d);
    box-shadow: 0 10px 25px rgba(0,201,255,0.3);
  }

  button:nth-child(4) {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    box-shadow: 0 10px 25px rgba(255,65,108,0.3);
  }

  button:nth-child(5) {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #111;
    box-shadow: 0 10px 25px rgba(247,151,30,0.3);
  }

  button:active {
    transform: scale(0.95);
  }
</style>
  </head>
  <body>
    
    
 <div class="box">
  <h1 class="title">STOPWATCH</h1>

  <h1 id="timer">00 : 00 : 00 : 00</h1>

  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="reset()">Reset</button>
</div>



    <script src="./app.js"></script>
  </body>
</html>
